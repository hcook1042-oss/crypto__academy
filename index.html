<!DOCTYPE html>

<html>

<head>

<title>Crypto Academy</title>

<style>

body{

background:#0b0f1a;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;

}

.box{

width:400px;
background:#111827;
padding:40px;
border-radius:15px;
box-shadow:0 0 20px rgba(255,193,7,.4);

}

h1{

color:#f5c542;
text-align:center;

}

input{

width:100%;
padding:15px;
margin:15px 0;
background:#1f2937;
border:none;
border-radius:8px;
color:white;

}

button{

width:100%;
padding:15px;
background:#f5c542;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;

}

button:hover{

background:#ffb700;

}

#msg{

margin-top:20px;
text-align:center;
color:white;

}

</style>

</head>

<body>

<div class="box">

<h1>Crypto Academy</h1>

<input
id="name"
placeholder="Full Name">

<input
id="email"
placeholder="Email Address">

<button onclick="save()">

Sign in

</button>

<div id="msg"></div>

</div>

<script>

function save(){

fetch("https://script.google.com/macros/s/AKfycbwn4G6zUfiuASvuTMwbnloImJCYdTVbYFovllhcg5ag2If-FI4Iw6q4VrHFLmQpHfw-/exec"),{

method:"POST",

body:new URLSearchParams({

name:document.getElementById("name").value,

email:document.getElementById("email").value

})

})

.then(res=>res.text())

.then(data=>{

document.getElementById("msg").innerHTML="Thank you for subscribing!";

});

}

</script>

</body>

</html>
